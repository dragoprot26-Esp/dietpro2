<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DietPro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    /* ── SISTEMA DE TEMAS ────────────────────────────────────── */
    :root {
      --primary:    #2ECC71;
      --primary-d:  #27AE60;
      --primary-15: rgba(46,204,113,0.15);
      --bg:         #0f1117;
      --surface:    #1a1a2e;
      --surface2:   #1e2235;
      --border:     #2a2d3e;
      --text:       #e8e8e8;
      --text-2:     #8b8fa8;
      --danger:     #E74C3C;
      --warning:    #F39C12;
      --info:       #2980B9;
      --radius:     12px;
      --nav-h:      64px;
    }
    [data-theme="light"] {
      --primary:    #27AE60;
      --primary-d:  #1E8449;
      --primary-15: rgba(39,174,96,0.12);
      --bg:         #F5F5F5;
      --surface:    #FFFFFF;
      --surface2:   #F0FFF4;
      --border:     #D5D8DC;
      --text:       #1a1a2e;
      --text-2:     #666;
    }
    [data-theme="dark-neutral"] {
      --primary:    #FFFFFF;
      --primary-d:  #CCCCCC;
      --primary-15: rgba(255,255,255,0.1);
      --bg:         #111111;
      --surface:    #1C1C1C;
      --surface2:   #242424;
      --border:     #333;
      --text:       #EEEEEE;
      --text-2:     #888;
    }
    [data-theme="custom"] {
      --primary:    var(--custom-accent, #2ECC71);
      --primary-d:  var(--custom-accent-d, #27AE60);
      --primary-15: var(--custom-accent-15, rgba(46,204,113,0.15));
    }

    /* ── RESET & BASE ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── SPLASH ──────────────────────────────────────────────── */
    #splash-screen {
      position: fixed; inset: 0;
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
    }
    .splash-logo { font-size: 64px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .splash-title { font-size: 28px; font-weight: 800; color: var(--primary); }
    .splash-sub { font-size: 14px; color: var(--text-2); }
    .splash-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGIN ───────────────────────────────────────────────── */
    #login-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      align-items: center; justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%; max-width: 380px;
    }
    /* Brand header */
    .login-brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .login-brand-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--primary); display: flex;
      align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .login-brand-text {}
    .login-title { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .login-sub { font-size: 13px; color: var(--text-2); margin-top: 2px; }

    /* License badge */
    .license-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: rgba(46,204,113,0.08);
      border: 1.5px solid var(--primary);
      border-radius: 10px; margin-bottom: 18px;
      font-size: 13px; font-weight: 600; color: var(--primary);
      cursor: pointer; transition: background 0.2s;
      position: relative;
    }
    .license-badge.empty {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text-2);
    }
    .license-badge-icons { display: flex; gap: 2px; }
    .license-badge-text { flex: 1; }
    .license-badge-arrow { margin-left: auto; font-size: 12px; transition: transform 0.2s; }
    .license-badge.open .license-badge-arrow { transform: rotate(180deg); }
    .license-input-wrap { display: none; margin-top: 10px; }
    .license-input-wrap.open { display: block; }

    /* Role toggle */
    .role-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; margin-bottom: 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
    }
    .role-btn {
      padding: 9px 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--text-2);
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .role-btn.active {
      background: var(--primary);
      color: #0f1117;
    }
    .role-btn:not(.active):hover { color: var(--text); }

    /* Form */
    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.6px; }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 15px; transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--primary); }
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 44px; }
    .input-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-2); font-size: 18px; padding: 4px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Remember me */
    .remember-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
    }
    .remember-row label { font-size: 13px; color: var(--text-2); cursor: pointer; }

    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--primary); color: #0f1117;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.3);
      color: #E74C3C; border-radius: 8px;
      padding: 10px 12px; font-size: 13px;
      margin-top: 10px; display: none;
    }

    /* Demo mode */
    .demo-btn {
      width: 100%; margin-top: 12px;
      padding: 10px;
      background: none; border: 1px dashed var(--border);
      border-radius: var(--radius); color: var(--text-2);
      font-size: 12px; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .demo-btn:hover { border-color: var(--primary); color: var(--primary); }
    .login-powered { font-size: 11px; color: var(--text-2); text-align: center; margin-top: 16px; }

    /* ── APP SHELL ───────────────────────────────────────────── */
    #app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: var(--nav-h);
    }

    /* Header */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-brand-icon { font-size: 22px; }
    .header-brand-name { font-size: 17px; font-weight: 800; color: var(--primary); }
    .header-store { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    /* Bell de notificaciones */
    .bell-btn {
      position: relative; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px;
      transition: background 0.2s;
    }
    .bell-btn:hover { background: var(--primary-15); }
    .bell-badge {
      position: absolute; top: -3px; right: -3px;
      background: var(--danger); color: white;
      font-size: 10px; font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%; display: none;
      align-items: center; justify-content: center;
    }
    .bell-badge.visible { display: flex; }

    /* Panel notificaciones */
    .notif-panel {
      position: fixed; top: 56px; right: 8px;
      width: min(340px, calc(100vw - 16px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 200; display: none;
      flex-direction: column; max-height: 420px;
    }
    .notif-panel.open { display: flex; }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .notif-header h3 { font-size: 14px; font-weight: 700; }
    .notif-mark-all { font-size: 11px; color: var(--primary); cursor: pointer; background: none; border: none; }
    .notif-list { overflow-y: auto; flex: 1; }
    .notif-item {
      display: flex; gap: 10px; padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: var(--surface2); }
    .notif-item.unread { background: var(--primary-15); }
    .notif-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .notif-title { font-size: 13px; font-weight: 600; }
    .notif-msg { font-size: 12px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
    .notif-time { font-size: 10px; color: var(--text-2); margin-top: 4px; }
    .notif-empty { text-align: center; padding: 32px 16px; color: var(--text-2); font-size: 14px; }

    /* Content */
    #app-content { flex: 1; }
    .view { display: none; }
    .view.active { display: block; }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h); z-index: 100;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: pointer;
      color: var(--text-2); font-size: 10px; font-weight: 500;
      transition: color 0.2s; border: none; background: none;
      padding: 6px 4px; letter-spacing: 0.2px;
    }
    .nav-item .nav-icon { font-size: 20px; transition: transform 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active .nav-icon { transform: scale(1.15); }
    .nav-item.center-btn {
      background: var(--primary);
      border-radius: 50%;
      width: 52px; height: 52px;
      margin: auto 4px;
      flex: 0 0 52px;
      color: #0f1117;
      font-size: 24px;
      box-shadow: 0 4px 14px rgba(46,204,113,0.4);
    }
    .nav-item.center-btn .nav-icon { font-size: 24px; }
    .nav-item.center-btn span:last-child { display: none; }

    /* ── VISTAS GENERALES ────────────────────────────────────── */
    .view-header {
      padding: 16px 16px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .view-title { font-size: 20px; font-weight: 800; }
    .view-subtitle { font-size: 13px; color: var(--text-2); margin-top: 2px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .card + .card { margin-top: 10px; }

    .btn {
      padding: 10px 18px; border-radius: var(--radius);
      border: none; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
    .btn-green { background: var(--primary); color: #0f1117; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(231,76,60,0.15); color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
    .btn-warning { background: rgba(243,156,18,0.15); color: var(--warning); }
    .btn:active { transform: scale(0.97); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-green  { background: var(--primary-15); color: var(--primary); }
    .badge-red    { background: rgba(231,76,60,0.15); color: var(--danger); }
    .badge-orange { background: rgba(243,156,18,0.15); color: var(--warning); }
    .badge-blue   { background: rgba(41,128,185,0.15); color: var(--info); }
    .badge-gray   { background: var(--surface2); color: var(--text-2); }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px 10px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 12px;
    }
    .stat-label { font-size: 11px; color: var(--text-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--primary); margin-top: 4px; }
    .stat-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }

    /* Alertas */
    .alert-strip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px; margin: 0 16px 10px;
      font-size: 13px; font-weight: 500;
    }
    .alert-strip.danger { background: rgba(231,76,60,0.12); color: var(--danger); border: 1px solid rgba(231,76,60,0.2); }
    .alert-strip.warning { background: rgba(243,156,18,0.12); color: var(--warning); border: 1px solid rgba(243,156,18,0.2); }

    /* Listas de items */
    .item-list { padding: 0 16px; }
    .item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--primary-15);
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .item-right { text-align: right; flex-shrink: 0; }
    .item-price { font-size: 15px; font-weight: 700; color: var(--primary); }
    .item-stock { font-size: 12px; color: var(--text-2); margin-top: 1px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      padding: 20px 20px 32px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

    /* Scanner overlay */
    #scanner-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: #000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
    }
    #scanner-overlay.open { display: flex; }
    #scanner-video { width: 100%; max-width: 480px; }
    .scanner-frame {
      position: absolute;
      width: 220px; height: 140px;
      border: 2px solid var(--primary);
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    }
    .scanner-line {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--primary);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%{top:0} 100%{top:calc(100% - 2px)} }
    .scanner-hint { position: absolute; bottom: 80px; color: white; font-size: 14px; text-align: center; padding: 0 32px; }
    .scanner-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.15); border: none;
      color: white; font-size: 20px; width: 40px; height: 40px;
      border-radius: 50%; cursor: pointer;
    }
    .scanner-manual {
      position: absolute; bottom: 24px;
      background: var(--primary); color: #0f1117;
      border: none; padding: 12px 28px; border-radius: 30px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 30px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 500; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Cargando inline */
    .loading-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 32px; color: var(--text-2); font-size: 14px; }
    .mini-spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* Chip/tag */
    .chip {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; gap: 4px;
      background: var(--surface2); color: var(--text-2);
    }

    /* FAB */
    .fab {
      position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #0f1117;
      border: none; font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(46,204,113,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 90; transition: transform 0.2s;
    }
    .fab:active { transform: scale(0.93); }

    /* Página pública */
    #public-screen { display: none; min-height: 100vh; }

    /* Responsive */
    @media (min-width: 480px) {
      .stats-row { grid-template-columns: repeat(4, 1fr); }
    }

    /* Scrollbar custom */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash-screen">
  <div class="splash-logo">🥦</div>
  <div class="splash-title">DietPro</div>
  <div class="splash-sub">Cargando tu gestión…</div>
  <div class="splash-spinner"></div>
</div>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-icon">🥦</div>
      <div class="login-brand-text">
        <div class="login-title">DietPro</div>
        <div class="login-sub">Sistema de Gestión de Dietética</div>
      </div>
    </div>

    <!-- License badge / toggle -->
    <div class="license-badge empty" id="license-badge" onclick="toggleLicenseInput()">
      <div class="license-badge-icons" id="license-status-icons">🔑</div>
      <span class="license-badge-text" id="license-badge-text">Tengo un código de licencia</span>
      <span class="license-badge-arrow">▼</span>
    </div>
    <div class="license-input-wrap" id="license-input-wrap">
      <input id="login-license" class="form-input" type="text"
        placeholder="DIET-0001-2026-XXXX"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        oninput="validateLicenseInput(this)">
    </div>

    <!-- Role selector -->
    <div class="role-toggle">
      <button class="role-btn active" id="role-admin" onclick="setRole('admin')">
        👤 Administrador
      </button>
      <button class="role-btn" id="role-collab" onclick="setRole('collaborator')">
        🤝 Colaborador
      </button>
    </div>

    <!-- Usuario -->
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input id="login-user" class="form-input" type="text" placeholder="usuario" autocomplete="off">
    </div>

    <!-- Contraseña -->
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrap">
        <input id="login-pass" class="form-input" type="password" placeholder="••••••" autocomplete="off">
        <button class="input-eye" onclick="togglePass()" type="button" title="Ver contraseña">👁</button>
      </div>
    </div>

    <!-- Recordar sesión -->
    <div class="remember-row">
      <input type="checkbox" id="remember-check">
      <label for="remember-check">Recordar sesión en este dispositivo</label>
    </div>

    <button class="btn-primary" id="login-btn" onclick="Auth.login()">
      Ingresar →
    </button>
    <div class="login-error" id="login-error"></div>

    <!-- Modo prueba -->
    <button class="demo-btn" onclick="Auth.demoMode()">
      🖊 Modo Prueba (sin Supabase)
    </button>

    <div class="login-powered">Powered by CyC Ecosystem</div>
  </div>
</div>

<script>
// Helpers para el nuevo login
function toggleLicenseInput() {
  const wrap = document.getElementById('license-input-wrap');
  const badge = document.getElementById('license-badge');
  wrap.classList.toggle('open');
  badge.classList.toggle('open');
}

function validateLicenseInput(el) {
  const val = el.value.trim().toUpperCase();
  el.value = val;
  const badge = document.getElementById('license-badge');
  const icons = document.getElementById('license-status-icons');
  const text  = document.getElementById('license-badge-text');
  if (val.startsWith('DIET') && val.length > 6) {
    badge.classList.remove('empty');
    icons.textContent = '✅ ✅';
    text.textContent = 'Licencia: ' + val + ' (DEMO)';
  } else if (val.length > 0) {
    badge.classList.add('empty');
    icons.textContent = '🔑';
    text.textContent = val;
  } else {
    badge.classList.add('empty');
    icons.textContent = '🔑';
    text.textContent = 'Tengo un código de licencia';
  }
}

function setRole(role) {
  document.getElementById('role-admin').classList.toggle('active', role === 'admin');
  document.getElementById('role-collab').classList.toggle('active', role === 'collaborator');
}

function togglePass() {
  const inp = document.getElementById('login-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Parche para demoMode si no existe en Auth
if (typeof Auth !== 'undefined') {
  if (!Auth.demoMode) Auth.demoMode = function() {
    App.toast('Modo prueba activado — sin conexión a Supabase', 'info');
  };
}
document.addEventListener('DOMContentLoaded', () => {
  // Agregar demoMode si Auth ya cargó
  setTimeout(() => {
    if (typeof Auth !== 'undefined' && !Auth.demoMode) {
      Auth.demoMode = () => App.toast?.('Modo prueba — sin Supabase', 'info');
    }
  }, 500);
});
</script>
